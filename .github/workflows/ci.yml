name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, json, mbstring, pdo_sqlite, sodium
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer check

  matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: matrix/package-lock.json
      - working-directory: matrix
        run: npm ci
      - working-directory: matrix
        run: npm run check
